<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Algérie — A Journey Through Cities</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="scene"></canvas>

    <header class="ui top">
      <a class="logo" href="#" aria-label="Home">
        <span class="flag" aria-hidden="true">🇩🇿</span>
        <span class="logo-text">ALGÉRIE</span>
      </a>
      <div class="blurb mono">
        DISCOVER ALGERIA — TWELVE CITIES, TWELVE LANDMARKS, ONE EXTRAORDINARY COUNTRY.
      </div>
      <div class="clocks mono">
        <div>ALGIERS <span id="clock-alg"></span> GMT+1</div>
      </div>
      <a class="cta" href="#paper-root">Explore</a>
    </header>

    <footer class="ui bottom">
      <nav class="tabs">
        <button class="tab active">Cities</button>
        <button class="tab">Regions</button>
        <button class="tab">About</button>
      </nav>
      <div class="hint mono">DRAG TO EXPLORE · CLICK TO UNFOLD</div>
    </footer>

    <div id="paper-root" class="paper-root" aria-hidden="true">
      <div class="paper-backdrop"></div>
      <div class="paper-stage">
        <article class="paper-sheet">
          <div class="paper-fold paper-fold-top"></div>
          <div class="paper-body">
            <button class="paper-close" aria-label="Close">✕</button>
            <header class="paper-header">
              <div class="paper-header-text">
                <h1 class="paper-city"></h1>
                <h2 class="paper-landmark"></h2>
              </div>
              <p class="paper-arabic"></p>
            </header>

            <div class="paper-hero">
              <div class="paper-map-wrap"></div>
              <div class="paper-art" aria-hidden="true"></div>
            </div>

            <p class="paper-desc"></p>

            <section class="paper-highlights">
              <h3 class="paper-section-title mono">Places & Highlights</h3>
              <ul class="paper-list"></ul>
            </section>

            <footer class="paper-footer">
              <div class="paper-tags"></div>
              <span class="paper-region mono"></span>
            </footer>
          </div>
          <div class="paper-fold paper-fold-bottom"></div>
        </article>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
